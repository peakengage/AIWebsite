name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  build-check:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

  deploy:
    name: Deploy to EC2
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/AIWebsite && git fetch origin ${{ github.ref_name }} && git checkout ${{ github.ref_name }} && git reset --hard origin/${{ github.ref_name }} && SKIP_GIT_PULL=true bash scripts/deploy.sh ${{ github.ref_name }}
